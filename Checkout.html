<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="checkout-container">

<h1>Customer Details</h1>

<form>

<label>Full Name</label><br>
<input type="text" placeholder="Enter your full name" required>

<br><br>

<label>Phone Number</label><br>
<input type="tel" placeholder="Enter your phone number" required>

<br><br>

<label>Email</label><br>
<input type="email" placeholder="Enter your email" required>

<br><br>

<label>Delivery Address</label><br>
<textarea placeholder="Enter your delivery address" rows="4" required></textarea>

<br><br>

<label>Payment Method</label><br>

<input type="radio" name="payment"> Cash on Delivery

<br>

<input type="radio" name="payment"> UPI

<br>

<input type="radio" name="payment"> Credit/Debit Card

<br><br>
    <button type="button" onclick="window.location.href='confirmation.html'">
    Place Order
</button>

</form>

</div>

</body>
</html>
